<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${reader.id != null} ? 'Редактировать читателя' : 'Добавить читателя'">Читатель</title>
    <link rel="stylesheet" th:href="@{/css/books.css}">
</head>
<body>
<div class="container">

    <h1 th:text="${reader.id != null} ? 'Редактировать читателя' : 'Добавить читателя'">Читатель</h1>
    <p class="subtitle" th:text="${reader.id} ? 'Измените данные читателя' : 'Заполните данные нового читателя'">Форма</p>

    <form class="form-card"
          th:action="${reader.id != null} ? @{/readers/{id}/edit(id=${reader.id})} : @{/readers/add}"
          th:object="${reader}"
          method="post">

        <div>
            <label for="fullName">Имя</label>
            <input id="fullName" type="text" th:field="*{fullName}" placeholder="Введите имя читателя"/>
            <span class="error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
        </div>

        <div class="actions">
            <button type="submit">Сохранить</button>
            <a th:href="@{/readers}" class="btn btn-secondary">Отмена</a>
        </div>

    </form>

</div>
</body>
</html>
