<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Библиотека</title>
    <link rel="stylesheet" th:href="@{/css/books.css}">
</head>
<body>
<div class="container">

    <nav class="nav-bar">
        <a th:href="@{/library}" class="btn btn-secondary">Книги</a>
        <a th:href="@{/readers}" class="btn btn-secondary">Читатели</a>
        <a th:href="@{/loans}" class="btn btn-secondary">Выдачи</a>
    </nav>

    <h1>Библиотека</h1>
    <p class="subtitle">Список всех книг</p>

    <div class="top-bar">
        <a th:href="@{/library/add}" class="add-btn">+ Добавить книгу</a>
    </div>

    <div class="book-card" th:each="book : ${books}">
        <h2 th:text="${book.title}">Название книги</h2>

        <div class="book-meta">
            <span><strong>Автор:</strong> <span th:text="${book.author}">Автор</span></span>
            <span><strong>Год:</strong> <span th:text="${book.publicationYear}">2000</span></span>
        </div>

        <div class="actions">
            <a th:href="@{/library/{id}(id=${book.id})}" class="btn btn-secondary">Подробнее</a>
            <a th:href="@{/library/{id}/edit(id=${book.id})}" class="btn btn-primary">Редактировать</a>
            <form th:action="@{/library/{id}/delete(id=${book.id})}" method="post">
                <button type="submit" class="btn btn-danger">Удалить</button>
            </form>
        </div>
    </div>

</div>
</body>
</html>
